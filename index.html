<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Marmite Bleue - HACCP Impression</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
}

th{
    background:#efefef;
}

.print-label{
    width:58mm;
    padding:10px;
    font-size:14px;
}

.label-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

@media print{
    body *{
        visibility:hidden;
    }

    #printArea, #printArea *{
        visibility:visible;
    }

    #printArea{
        position:absolute;
        left:0;
        top:0;
        width:58mm;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>La Marmite Bleue - HACCP</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls">
<button onclick="importExcel()">Importer Excel</button>

<table>
<thead>
<tr>
<th>Catégorie</th>
<th>Produit</th>
<th>Sous-produit</th>
<th>DLC</th>
<th>Unité</th>
<th>Température</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div id="printArea"></div>

<script>

let importedData = [];

function importExcel(){

    const fileInput = document.getElementById("excelFile");
    const file = fileInput.files[0];

    if(!file){
        alert("Choisis un fichier Excel");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});

        const sheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[sheetName];

        importedData = XLSX.utils.sheet_to_json(worksheet);

        renderTable();
    };

    reader.readAsArrayBuffer(file);
}

function renderTable(){

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    importedData.forEach((row, index) => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row["Catégorie"] || ""}</td>
            <td>${row["Produit"] || ""}</td>
            <td>${row["Sous-produit / Saveur"] || ""}</td>
            <td>${row["DLC"] || ""}</td>
            <td>${row["Unité DLC"] || ""}</td>
            <td>${row["Température"] || ""}</td>
            <td>
                <button onclick="printLabel(${index})">
                    Imprimer
                </button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

function calculateExpiry(dlc, unit){

    const now = new Date();

    if(unit === "heures"){
        now.setHours(now.getHours() + Number(dlc));
    }

    if(unit === "jours"){
        now.setDate(now.getDate() + Number(dlc));
    }

    return now.toLocaleString("fr-FR");
}

function printLabel(index){

    const row = importedData[index];

    const now = new Date().toLocaleString("fr-FR");

    const expiry = calculateExpiry(
        row["DLC"],
        row["Unité DLC"]
    );

    const printArea = document.getElementById("printArea");

    printArea.innerHTML = `
        <div class="print-label">

            <div class="label-title">
                ${row["Produit"] || ""}
            </div>

            <p><strong>Saveur :</strong>
            ${row["Sous-produit / Saveur"] || "-"}</p>

            <p><strong>Préparé le :</strong><br>
            ${now}</p>

            <p><strong>À utiliser avant :</strong><br>
            ${expiry}</p>

            <p><strong>Température :</strong>
            ${row["Température"] || ""}</p>

            <p><strong>Allergènes :</strong><br>
            ${row["Allergènes"] || "-"}</p>

        </div>
    `;

    window.print();
}

</script>

</body>
</html>
